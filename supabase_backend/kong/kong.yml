###
# Services
###
services:
  ## Open Auth
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open-routes
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  ## Auth Admin
  - name: auth-v1-admin
    url: http://auth:9999/admin
    routes:
      - name: auth-v1-admin-routes
        strip_path: true
        paths:
          - /auth/v1/admin
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  ## REST (PostgREST)
  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-routes
        strip_path: true
        paths:
          - /rest/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  ## Auth
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-routes
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  ## Realtime
  - name: realtime-v1
    url: http://realtime:4000
    protocol: ws
    routes:
      - name: realtime-v1-routes
        strip_path: true
        paths:
          - /realtime/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  ## Storage
  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-v1-routes
        strip_path: true
        paths:
          - /storage/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

  ## Meta
  - name: meta
    url: http://meta:8080
    routes:
      - name: meta-routes
        strip_path: true
        paths:
          - /pg
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true

###
# ACL Plugin for service_role
###
plugins:
  - name: acl
    service: auth-v1-admin
    config:
      hide_groups_header: true
      allow:
        - service_role

  - name: request-transformer
    service: rest-v1
    config:
      add:
        headers:
          - "Content-Profile:public"

  - name: request-transformer
    service: auth-v1
    config:
      add:
        headers:
          - "apikey:${SUPABASE_ANON_KEY}"
